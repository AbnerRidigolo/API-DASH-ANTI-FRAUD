services:
  - type: web
    name: antifraude-api
    runtime: python
    rootDir: windows
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AUTH_API_KEY
        generateValue: true          # Render gera uma chave aleatória segura
      - key: DATABASE_URL
        fromDatabase:
          name: antifraude-db
          property: connectionString
      - key: MOCK_MODE
        value: "true"
      - key: LOG_LEVEL
        value: info

databases:
  - name: antifraude-db
    databaseName: antifraude
    plan: free
